<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval'; worker-src 'self' blob: data:; font-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Reader</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="background-orb orb-one"></div>
    <div class="background-orb orb-two"></div>

    <div class="app-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Repo Reader</p>
                <h1>Navigazione repository e documentazione</h1>
                <p id="root-path" class="subtle"></p>
            </div>

            <div class="toolbar">
                <div class="mode-toggle" role="group" aria-label="Modalità di lavoro">
                    <button type="button" data-mode="view" class="mode-button is-active">Visualizza</button>
                    <button type="button" data-mode="edit" class="mode-button">Modifica</button>
                </div>
                <div class="toolbar-actions">
                    <button type="button" id="sidebar-toggle" class="secondary-toggle" aria-pressed="true">Nascondi indice</button>
                    <div class="overflow-actions" id="overflow-actions">
                        <button type="button" id="overflow-button" aria-haspopup="menu" aria-expanded="false">Azioni</button>
                        <div id="overflow-menu" class="action-menu" hidden>
                            <button type="button" data-overflow-action="up">Vai alla cartella superiore</button>
                            <button type="button" data-overflow-action="refresh">Aggiorna contenuto</button>
                            <button type="button" data-overflow-action="open-folder">Apri cartella di sistema</button>
                            <button type="button" data-overflow-action="open-code">Apri in VS Code</button>
                            <div class="action-menu-divider"></div>
                            <button type="button" data-print-mode="print">Stampa documento</button>
                            <button type="button" data-print-mode="pdf">Esporta PDF</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="workspace">
            <aside class="sidebar panel" id="sidebar">
                <div class="panel-head">
                    <span>Struttura</span>
                    <span id="entry-count" class="badge"></span>
                </div>
                <div class="sidebar-tools">
                    <input id="search-input" type="search" placeholder="Filtra cartella o file...">
                    <button type="button" id="clear-filter">Pulisci</button>
                </div>
                <div id="breadcrumbs" class="breadcrumbs"></div>
                <div id="file-list" class="file-list"></div>
            </aside>

            <section class="content">
                <article class="panel preview-panel">
                    <div class="panel-head">
                        <div>
                            <span>Anteprima</span>
                            <p id="selected-file" class="subtle"></p>
                        </div>
                        <span id="selected-type" class="badge"></span>
                    </div>
                    <div id="preview" class="preview"></div>
                </article>

                <article class="panel editor-panel">
                    <div class="panel-head">
                        <div>
                            <span>Editor guidato</span>
                            <p class="subtle">La modifica si apre solo nella modalità dedicata, per usare tutta la finestra.</p>
                        </div>
                        <div class="toolbar compact">
                            <button type="button" id="save-file" disabled>Salva</button>
                        </div>
                    </div>
                    <div class="editor-stage">
                        <div id="editor-host" class="editor-host" hidden></div>
                        <textarea id="editor" class="editor-fallback" spellcheck="false" placeholder="Seleziona un file modificabile..."></textarea>
                    </div>
                    <div class="status-row">
                        <span id="status">Pronto.</span>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script src="../../node_modules/monaco-editor/min/vs/loader.js"></script>
    <script src="./renderer.js"></script>
</body>
</html>
